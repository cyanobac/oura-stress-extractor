services:
  backend:
    build: ./backend
    restart: unless-stopped
    expose:
      - "8000"
    # No published ports: only Caddy talks to it.
    # Hard memory ceiling so a runaway/leaky OCR job gets the container OOM-killed
    # (and restarted, per restart: unless-stopped) instead of letting the host's
    # OOM-killer roam and possibly take down Caddy or sshd. Concurrency is already
    # bounded in routes.py (MAX_CONCURRENT_EXTRACTIONS); this is the safety net.
    deploy:
      resources:
        limits:
          memory: 2.5G
    environment:
      # Persist the per-IP rate-limit counter so the daily limit survives restarts.
      RATE_LIMIT_DB: /data/ratelimit.db
      # Durable request log (timestamp, hashed IP, processing time, outcome).
      # REQUEST_LOG_SALT must stay constant across restarts for repeat-visitor
      # correlation to hold; set it in .env (see .env.example).
      REQUEST_LOG_DB: /data/requests.db
      REQUEST_LOG_SALT: ${REQUEST_LOG_SALT:-}
    volumes:
      - ratelimit_data:/data
    # Defense-in-depth: no extra privileges, no Linux capabilities (uvicorn binds
    # an unprivileged port and needs none).
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      # python is already in the image (no curl), so probe with urllib.
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      args:
        # Baked into the static bundle at build time; empty hides the footer link.
        VITE_CONTACT_EMAIL: ${CONTACT_EMAIL:-}
    restart: unless-stopped
    expose:
      - "80"
    security_opt:
      - no-new-privileges:true
    # Stock nginx runs its master as root and drops workers to the `nginx` user,
    # and binds port 80 — so it needs exactly these caps and no more.
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - NET_BIND_SERVICE
    healthcheck:
      # busybox wget ships in nginx:alpine. Use 127.0.0.1 (not localhost): nginx
      # listens on IPv4 only, but `localhost` can resolve to IPv6 ::1 first.
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    security_opt:
      - no-new-privileges:true
    # Caddy runs as a single root process; it only needs to bind 80/443.
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    environment:
      # Set these in a .env file next to this compose file (see .env.example).
      # Local default: plain HTTP on localhost. Production can override this
      # with `https://...` plus `tls_origin` to use mounted Cloudflare Origin certs.
      CADDY_SITE_ADDR: ${CADDY_SITE_ADDR:-http://localhost}
      CADDY_TLS_SNIPPET: ${CADDY_TLS_SNIPPET:-no_tls}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      # Mount a cert directory for production. Local runs can leave it empty;
      # the Caddyfile defaults to `no_tls` (plain HTTP) unless told otherwise.
      - ./certs:/etc/caddy/certs:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
  ratelimit_data:
